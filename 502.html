<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviço indisponível — Rezult</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: #334155;
            padding: 24px;
        }
        .container { text-align: center; max-width: 420px; }
        .logo img { max-height: 48px; width: auto; }
        .code {
            margin-top: 28px;
            font-size: 5rem;
            font-weight: 700;
            color: #dc2626;
            line-height: 1;
        }
        .desc { margin-top: 12px; color: #64748b; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 28px;
            padding: 12px 24px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo">
            <img src="/assets/img/logo-rezult.png" alt="Rezult" width="160" height="48">
        </a>
        <div class="code">502</div>
        <p class="desc">O serviço está temporariamente indisponível. Tente novamente em alguns instantes.</p>
        <a href="/" class="btn">Ir para o início</a>
    </div>
</body>
</html>
